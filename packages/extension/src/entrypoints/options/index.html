<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipRoot Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>ClipRoot Settings</h1>

      <section class="section">
        <h2>Global</h2>
        <label class="toggle-row">
          <span>Enable provenance capture</span>
          <input type="checkbox" id="global-toggle" />
        </label>
        <label class="toggle-row">
          <span>Highlight clipped passages on page</span>
          <input type="checkbox" id="highlights-toggle" />
        </label>
      </section>

      <section class="section">
        <h2>Per-Site Overrides</h2>
        <div id="site-list"></div>

        <div class="add-site">
          <input type="text" id="add-hostname" placeholder="example.com" />
          <select id="add-value">
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
          <button id="add-btn">Add</button>
        </div>

        <button id="clear-all" class="danger">Clear all overrides</button>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
