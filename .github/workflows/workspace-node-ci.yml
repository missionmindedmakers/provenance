name: Workspace Node CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  workspace-node-ci:
    name: Build/Test/Pack Spec + Build/Test Sample App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @provenance/spx-prov-spec
        run: pnpm --filter @provenance/spx-prov-spec build

      - name: Verify @provenance/spx-prov-spec asset mirrors
        run: pnpm --filter @provenance/spx-prov-spec check:assets

      - name: Test @provenance/spx-prov-spec
        run: pnpm --filter @provenance/spx-prov-spec test

      - name: Pack @provenance/spx-prov-spec
        run: |
          mkdir -p artifacts
          cd packages/spx-prov-spec
          pnpm pack --pack-destination ../../artifacts

      - name: Test sample-app
        run: pnpm --filter sample-app test

      - name: Build sample-app
        run: pnpm --filter sample-app build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: spx-prov-spec-tarball
          path: artifacts/*.tgz
          if-no-files-found: error
